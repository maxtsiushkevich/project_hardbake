global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]

  - job_name: "sniffer_service"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:8000" ]

  - job_name: "system_info_service"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:8001" ]
  #      - targets: ["localhost:8000"]

  - job_name: "packet_processor_service"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:8002" ]

  - job_name: "ml_data_processor_service"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:8003" ]

  - job_name: "ml_training_svc"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:8004" ]

  - job_name: "threat_detection_svc"
    metrics_path: "/metrics"
    static_configs:
      - targets: [ "host.docker.internal:8005" ]